rules:
  - rule_id: RULE-001
    name: 로그인 실패 급증
    type: aggregation
    enabled: true
    match:
      event_type: login_failure
    group_by: [target_user]
    window:
      minutes: 5
    threshold:
      count_gte: 10
    severity: medium
    score: 40 # 50 -> 40으로 소폭 하향 (일반 계정 잦은 오입력 고려)
    score_modifiers:
      - field: is_admin_account
        op: eq
        value: true
        add: 30 # 관리자 계정일 때의 가중치를 높여 차별화 (+20 -> +30)
    attack:
      tactic: Credential Access
      technique: T1110
    response_guide:
      - 계정 잠금 정책 확인
      - source_ip 차단 검토

  - rule_id: RULE-002
    name: 관리자 계정 로그인 성공
    enabled: true
    type: single_event
    match:
      event_id: "4624"
      is_admin_account: true
    severity: low
    score: 20 # 기본 로그인은 30->20점으로 낮춤
    score_modifiers:
      - field: logon_type
        op: eq
        value: "10" # RDP 원격 접속을 통한 관리자 로그인이면 위험도 폭증
        add: 40 
    attack:
      tactic: Initial Access
      technique: Valid Accounts
    response_guide:
      - 관리자 계정의 정상 로그인인지 확인
      - 비정상 시간대 로그인 여부 확인
      - 원격 로그인 여부 및 source_ip 확인

  - rule_id: RULE-003
    name: 관리자 계정 로그오프
    enabled: true
    type: single_event
    match:
      event_id: "4634"
      is_admin_account: true
    severity: informational
    score: 5 # 15 -> 5로 하향 (단순 상태 기록용)
    attack:
      tactic: None
      technique: Logoff Event
    response_guide:
      - 관리자 세션 종료가 정상 행위인지 확인
      - 비정상 시간대의 로그오프 여부 확인
      - 직전 관리자 로그인 이벤트와 연관성 확인

  - rule_id: RULE-004
    name: 계정 생성
    enabled: true
    type: single_event
    match:
      event_id: "4720"
    severity: medium
    score: 40 # 50 -> 40 조정 (인프라 확장 시 대량 발생 고려)
    attack:
      tactic: Persistence
      technique: Create Account
    response_guide:
      - 신규 계정 생성이 정상 작업인지 확인
      - 생성된 계정의 권한 확인
      - 비인가 계정 생성 여부 점검

  - rule_id: RULE-005
    name: 비밀번호 변경
    enabled: true
    type: single_event
    match:
      event_id: "4723"
    severity: medium
    score: 40
    attack:
      tactic: Credential Access
      technique: Password Change
    response_guide:
      - 사용자 본인의 정상 비밀번호 변경인지 확인
      - 비정상 시간대 변경 여부 확인
      - 직전 로그인 및 계정 사용 이력 확인

  - rule_id: RULE-006
    name: 비밀번호 재설정
    enabled: true
    type: single_event
    match:
      event_id: "4724"
    severity: high
    score: 60
    attack:
      tactic: Credential Access
      technique: Account Manipulation
    response_guide:
      - 관리자에 의한 정상 재설정인지 확인
      - 재설정 대상 계정 중요도 확인
      - 비인가 비밀번호 재설정 여부 점검

  - rule_id: RULE-007
    name: 계정 비활성화
    enabled: true
    type: single_event
    match:
      event_id: "4725"
    severity: medium
    score: 45
    attack:
      tactic: Defense Evasion
      technique: Account Manipulation
    response_guide:
      - 계정 비활성화가 정상 관리 작업인지 확인
      - 비활성화된 계정의 중요도 확인
      - 직전 계정 변경 및 로그인 이력 확인

  - rule_id: RULE-008
    name: 계정 삭제
    enabled: true
    type: single_event
    match:
      event_id: "4726"
    severity: high
    score: 70
    attack:
      tactic: Defense Evasion
      technique: Account Manipulation
    response_guide:
      - 계정 삭제가 정상 관리 작업인지 확인
      - 삭제된 계정의 중요도 확인
      - 관리자 계정 또는 서비스 계정 삭제 여부 점검

  - rule_id: RULE-009
    name: Domain Admins 그룹 멤버 추가
    enabled: true
    type: single_event
    match:
      event_id: "4728"
      group_name: "Domain Admins"
    severity: high
    score: 75
    attack:
      tactic: Privilege Escalation
      technique: Account Manipulation
    response_guide:
      - Domain Admins 그룹 변경이 정상 작업인지 확인
      - 추가된 대상 계정의 중요도 확인
      - 변경 수행 계정과 승인 이력 점검

  - rule_id: RULE-010
    name: Domain Admins 그룹 멤버 제거
    enabled: true
    type: single_event
    match:
      event_id: "4729"
      group_name: "Domain Admins"
    severity: medium # high -> medium
    score: 50 # 70 -> 50 하향 (정상 권한 회수 작업이 많음)
    attack:
      tactic: Defense Evasion
      technique: Account Manipulation
    response_guide:
      - Domain Admins 그룹에서 제거된 계정이 정상 변경 대상인지 확인
      - 제거 수행 계정과 승인 이력 점검
      - 직전 그룹 변경 및 관리자 활동 이력 확인

  - rule_id: RULE-011
    name: Administrators 로컬 그룹 멤버 추가
    enabled: true
    type: single_event
    match:
      event_id: "4732"
      group_name: "Administrators"
    severity: high
    score: 75
    attack:
      tactic: Privilege Escalation
      technique: Account Manipulation
    response_guide:
      - Administrators 그룹 변경이 정상 작업인지 확인
      - 추가된 대상 계정의 관리자 권한 필요성 확인
      - 변경 수행 계정과 승인 이력 점검

  - rule_id: RULE-012
    name: Administrators 로컬 그룹 멤버 제거
    enabled: true
    type: single_event
    match:
      event_id: "4733"
      group_name: "Administrators"
    severity: low # medium -> low
    score: 35 # 60 -> 35 하향
    attack:
      tactic: Defense Evasion
      technique: Account Manipulation
    response_guide:
      - Administrators 그룹에서 제거된 계정이 정상 변경 대상인지 확인
      - 제거 수행 계정과 승인 이력 점검
      - 직전 관리자 그룹 변경 및 계정 활동 이력 확인

  - rule_id: RULE-013
    name: Enterprise Admins 그룹 멤버 추가
    enabled: true
    type: single_event
    match:
      event_id: "4756"
      group_name: "Enterprise Admins"
    severity: high
    score: 80
    attack:
      tactic: Privilege Escalation
      technique: Account Manipulation
    response_guide:
      - Enterprise Admins 그룹 변경이 정상 작업인지 확인
      - 추가된 대상 계정의 필요 권한 여부 확인
      - 변경 수행 계정과 승인 이력 점검

  - rule_id: RULE-014
    name: Enterprise Admins 그룹 멤버 제거
    enabled: true
    type: single_event
    match:
      event_id: "4757"
      group_name: "Enterprise Admins"
    severity: medium # high -> medium
    score: 55 # 75 -> 55 하향
    attack:
      tactic: Defense Evasion
      technique: Account Manipulation
    response_guide:
      - Enterprise Admins 그룹에서 제거된 계정이 정상 변경 대상인지 확인
      - 제거 수행 계정과 승인 이력 점검
      - 직전 그룹 변경 및 관리자 활동 이력 확인

  - rule_id: RULE-015
    name: PowerShell 과도한 실행
    type: aggregation
    enabled: true
    match:
      event_id: "4688"
      service_name: "powershell.exe"
    group_by: [computer_name, username]
    window:
      minutes: 2
    threshold:
      count_gte: 5  # 2분 내 5번 이상 실행 시 탐지
    severity: high
    score: 60
    attack:
      tactic: Execution
      technique: T1059.001
    response_guide:
      - 인코딩된 커맨드라인 인자 유무 확인
      - 비정상 스크립트 다운로드 이력 점검

  - rule_id: RULE-016
    name: 의심 LOLBin 명령 실행
    enabled: true
    type: single_event
    match:
      event_id: "1"
    match_any:
      image:
        - powershell.exe
        - cmd.exe
        - wscript.exe
        - cscript.exe
        - mshta.exe
        - rundll32.exe
        - regsvr32.exe
        - certutil.exe
    contains_any:
      command_line:
        - "-enc"
        - "-encodedcommand"
        - "downloadstring"
        - "iex"
        - "http"
        - "hidden"
        - "bypass"
    severity: high
    score: 85
    attack:
      tactic: Execution
      technique: Command and Scripting Interpreter
    response_guide:
      - 실행된 프로세스와 명령줄 인자를 확인
      - 부모 프로세스와 직전 행위를 점검
      - 외부 통신, DNS 질의, 파일 생성과 연관 분석

  - rule_id: RULE-017
    name: 의심 LOLBin 외부 네트워크 연결
    enabled: true
    type: single_event
    match:
      event_id: "3"
    match_any:
      image:
        - powershell.exe
        - cmd.exe
        - wscript.exe
        - cscript.exe
        - mshta.exe
        - rundll32.exe
        - regsvr32.exe
        - certutil.exe
      destination_port:
        - "80"
        - "443"
        - "8080"
        - "8443"
    severity: high
    score: 75
    attack:
      tactic: Command and Control
      technique: Application Layer Protocol
    response_guide:
      - 연결을 시도한 프로세스와 대상 IP/포트를 확인
      - 직전 Process Create 및 DNS Query와 연관 분석
      - 외부 통신 필요성이 있는 정상 행위인지 검토

  - rule_id: RULE-018
    name: 의심 LOLBin 비정상 DLL 로드
    enabled: true
    type: single_event
    match:
      event_id: "7"
    match_any:
      image:
        - powershell.exe
        - wscript.exe
        - cscript.exe
        - mshta.exe
        - rundll32.exe
        - regsvr32.exe
    contains_any:
      image_loaded:
        - "\\appdata\\"
        - "\\temp\\"
        - "\\public\\"
        - "\\downloads\\"
    severity: high
    score: 80
    attack:
      tactic: Defense Evasion
      technique: Hijack Execution Flow
    response_guide:
      - DLL을 로드한 프로세스와 DLL 경로를 확인
      - 사용자 경로/임시 경로에서 로드된 이유를 점검
      - 서명 상태와 직전 Process Create 행위를 연관 분석

  - rule_id: RULE-019
    name: 의심 LOLBin 비정상 파일 생성
    enabled: true
    type: single_event
    match:
      event_id: "11"
    match_any:
      image:
        - powershell.exe
        - cmd.exe
        - wscript.exe
        - cscript.exe
        - mshta.exe
        - rundll32.exe
        - regsvr32.exe
        - certutil.exe
    contains_any:
      target_filename:
        - "\\appdata\\"
        - "\\temp\\"
        - "\\public\\"
        - "\\startup\\"
        - "\\downloads\\"
    severity: high
    score: 75
    attack:
      tactic: Defense Evasion
      technique: Masquerading
    response_guide:
      - 생성한 프로세스와 파일 경로를 확인
      - 파일 확장자와 저장 위치의 정상 여부를 점검
      - 직전 Process Create, DNS, Network Connection과 연관 분석

  - rule_id: RULE-020
    name: 의심 프로세스 Run 키 생성삭제
    enabled: true
    type: single_event
    match:
      event_id: "12"
    match_any:
      image:
        - powershell.exe
        - cmd.exe
        - wscript.exe
        - cscript.exe
        - mshta.exe
        - rundll32.exe
        - regsvr32.exe
        - certutil.exe
    contains_any:
      target_object:
        - "\\software\\microsoft\\windows\\currentversion\\run"
        - "\\software\\microsoft\\windows\\currentversion\\runonce"
    severity: high
    score: 80
    attack:
      tactic: Persistence
      technique: Registry Run Keys / Startup Folder
    response_guide:
      - 변경한 프로세스와 레지스트리 경로를 확인
      - Run/RunOnce 키 변경이 정상 작업인지 점검
      - 직전 Process Create, File Create와 연관 분석

  - rule_id: RULE-021
    name: 의심 프로세스 Run 값 설정
    enabled: true
    type: single_event
    match:
      event_id: "13"
    match_any:
      image:
        - powershell.exe
        - cmd.exe
        - wscript.exe
        - cscript.exe
        - mshta.exe
        - rundll32.exe
        - regsvr32.exe
        - certutil.exe
    contains_any:
      target_object:
        - "\\software\\microsoft\\windows\\currentversion\\run"
        - "\\software\\microsoft\\windows\\currentversion\\runonce"
    severity: high
    score: 85
    attack:
      tactic: Persistence
      technique: Registry Run Keys / Startup Folder
    response_guide:
      - 변경한 프로세스와 레지스트리 값 경로를 확인
      - 설정된 값 데이터(details)가 정상 프로그램 경로인지 점검
      - 직전 Process Create, File Create와 연관 분석

  - rule_id: RULE-022
    name: 의심 프로세스 Run 값 이름 변경
    enabled: true
    type: single_event
    match:
      event_id: "14"
    match_any:
      image:
        - powershell.exe
        - cmd.exe
        - wscript.exe
        - cscript.exe
        - mshta.exe
        - rundll32.exe
        - regsvr32.exe
        - certutil.exe
    contains_any:
      target_object:
        - "\\software\\microsoft\\windows\\currentversion\\run"
        - "\\software\\microsoft\\windows\\currentversion\\runonce"
    severity: high
    score: 80
    attack:
      tactic: Persistence
      technique: Registry Run Keys / Startup Folder
    response_guide:
      - 변경한 프로세스와 레지스트리 값 경로를 확인
      - 변경 전후 값 이름이 정상 프로그램 식별자인지 점검
      - 직전 Registry Value Set 및 Process Create와 연관 분석

  - rule_id: RULE-023
    name: 의심 프로세스 DNS
    enabled: true
    type: single_event
    match:
      event_id: "22"
    match_any:
      image:
        - powershell.exe
        - cmd.exe
        - wscript.exe
        - cscript.exe
        - mshta.exe
        - rundll32.exe
        - regsvr32.exe
        - certutil.exe
    contains_any:
      query_name:
        - ".top"
        - ".xyz"
        - ".shop"
        - ".monster"
        - "pastebin"
        - "github"
        - "raw.githubusercontent"
        - "ngrok"
    severity: high
    score: 75
    attack:
      tactic: Command and Control
      technique: DNS
    response_guide:
      - DNS 질의를 수행한 프로세스와 도메인을 확인
      - 정상 업무에서 필요한 도메인인지 검토
      - 직전 Process Create, Network Connection과 연관 분석

      # [프로세스 생성 및 실행 관련]
  - rule_id: RULE-041
    name: 프로세스 생성 (Sysmon/Event 4688)
    enabled: true
    type: single_event
    match:
      event_id: "4688"
    severity: low
    score: 10
    attack:
      tactic: Execution
      technique: T1059
    response_guide:
      - 실행된 프로세스의 경로 및 인자 확인
      - 부모 프로세스와의 관계 확인

  - rule_id: RULE-042
    name: PowerShell 실행 탐지
    enabled: true
    type: single_event
    match:
      event_id: "4688"
      service_name: "powershell.exe" # 또는 process_name 필드가 있다면 활용
    severity: low # medium -> low
    score: 20 # 40 -> 20 하향 (단순 실행은 오탐이 너무 많음)
    attack:
      tactic: Execution
      technique: T1059.001
    response_guide:
      - 실행된 스크립트 내용 및 인자 확인
      - 비정상적인 네트워크 연결 시도 여부 점검

  # [원격 접속 및 네트워크 관련]
  - rule_id: RULE-061
    name: 원격 접속 흔적 (로그인 타입 10)
    enabled: true
    type: single_event
    match:
      event_id: "4624"
      logon_type: "10" # RemoteInteractive (RDP)
    severity: low
    score: 20
    attack:
      tactic: Lateral Movement
      technique: T1021.001
    response_guide:
      - 소스 IP가 인가된 관리자 IP인지 확인
      - 접속 시간대의 적절성 판단

  - rule_id: RULE-062
    name: Kerberos 인증 서비스 요청 (AS-REQ)
    enabled: true
    type: single_event
    match:
      event_id: "4768"
    severity: low
    score: 15
    attack:
      tactic: Credential Access
      technique: T1558
    response_guide:
      - 과도한 인증 요청 발생 여부 확인
      - 암호화 수준(Encryption Type) 확인

  - rule_id: RULE-063
    name: AS-REP Roasting 취약 설정 계정 인증 시도
    type: single_event
    enabled: true
    match:
      event_id: "4768"
      pre_auth_type: 0  # Pre-Auth 미사용
    severity: medium
    score: 50
    attack:
      tactic: Credential Access
      technique: T1558.004
    response_guide:
      - 해당 계정의 'Do not require Kerberos preauthentication' 설정 확인
      - 비인가된 IP에서의 요청인지 점검

  # RULE-064: 다수 계정 대상 AS-REP Roasting 스캐닝 (Horizontal Aggregation)
  - rule_id: RULE-064
    name: 다수 계정 대상 AS-REP Roasting 스캐닝 의심
    type: aggregation
    enabled: true
    match:
      event_id: "4768"
      pre_auth_type: 0
    group_by: [source_ip]
    window:
      minutes: 5
    threshold:
      count_gte: 5  # 5분 내 5개 이상의 다른 계정에 대해 시도
    severity: high
    score: 80
    attack:
      tactic: Credential Access
      technique: T1558.004
    response_guide:
      - 공격 원점 IP(source_ip) 차단 검토
      - 내부 자산에 대한 전수 보안 점검 실시

  # RULE-065: 특정 계정 대상 AS-REP Roasting 반복 시도 (Vertical Aggregation)
  - rule_id: RULE-065
    name: 특정 계정 대상 집중 AS-REP Roasting 시도
    type: aggregation
    enabled: true
